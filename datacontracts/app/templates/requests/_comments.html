{% if req.comments %}
<div class="divide-y divide-gray-100">
  {% for c in req.comments %}
  <div class="px-5 py-4 flex gap-3">
    <div class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold text-white shrink-0 mt-0.5"
      style="background:linear-gradient(135deg,#FF6200,#E05200)">{{ c.author[0] }}</div>
    <div>
      <div class="flex items-center gap-2 mb-1">
        <span class="text-sm font-semibold text-gray-800">{{ c.author }}</span>
        <span class="text-xs text-gray-400 mono">{{ c.date }}</span>
      </div>
      <p class="text-sm text-gray-600">{{ c.text }}</p>
    </div>
  </div>
  {% endfor %}
</div>
{% else %}
<div class="flex flex-col items-center justify-center py-8 text-gray-300">
  <p class="text-sm">Nenhum comentário ainda</p>
</div>
{% endif %}
