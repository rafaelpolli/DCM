<div class="space-y-3 max-w-2xl">
  {% if contract.history %}
  {% for h in contract.history | reverse %}
  <div class="flex gap-4">
    <div class="flex flex-col items-center">
      <div class="w-3 h-3 rounded-full mt-1 flex-shrink-0" style="background:#185FA5"></div>
      {% if not loop.last %}<div class="w-px flex-1 bg-zinc-800 mt-1"></div>{% endif %}
    </div>
    <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-4 flex-1 mb-2">
      <div class="flex items-center justify-between mb-1">
        <span class="mono text-sm font-medium text-blue-400">v{{ h.version }}</span>
        <span class="text-xs text-zinc-500 mono">{{ h.date }}</span>
      </div>
      <p class="text-sm text-zinc-300">{{ h.note }}</p>
      <p class="text-xs text-zinc-600 mt-1 mono">{{ h.author }}</p>
    </div>
  </div>
  {% endfor %}
  {% else %}
  <div class="text-zinc-600 text-sm">Nenhum histórico disponível.</div>
  {% endif %}
</div>
